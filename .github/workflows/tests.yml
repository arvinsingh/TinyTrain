name: Run Pytest
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install uv + Python
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          python-version: "3.11"
      - name: Install project + test dependencies
        run: uv sync --extra test
      - name: Run full test suite
        run: uv run pytest -v